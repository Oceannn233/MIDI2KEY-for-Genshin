name: Build Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --yes --no-progress
      - name: Build portable app and installer
        shell: powershell
        run: .\scripts\build-windows.ps1
      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $notes = "Windows desktop release. Download the Setup EXE for installation or the portable EXE for direct use."
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "MIDI2KEY for Genshin $tag" --notes $notes
          }
          gh release upload $tag release/windows/*.exe --clobber
